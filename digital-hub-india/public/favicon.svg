<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <!-- Rounded gradient background for high-visibility and visual fidelity in both light/dark address bars -->
  <rect width="100" height="100" rx="22" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Main Tech D Symbol -->
  <g transform="translate(1, -2)">
    <!-- Node network on the left representing modern tech/software/services -->
    <circle cx="15" cy="38" r="4" fill="#84cc16"/>
    <path d="M15 38h18" stroke="#84cc16" stroke-width="2.5" stroke-linecap="round"/>
    
    <circle cx="11" cy="51" r="4.5" fill="#f59e0b"/>
    <path d="M11 51h20" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
    
    <circle cx="15" cy="64" r="4" fill="#10b981"/>
    <path d="M15 64h15" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>

    <!-- High-tech blue-indigo gradient curved "D" -->
    <path d="M36 20h28c14 0 26 9 26 24s-12 24-26 24H36V20z" stroke="url(#blue-grad-fav)" stroke-width="6.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
    
    <!-- Pixels and digital nodes on the curve -->
    <rect x="52" y="16" width="5" height="5" rx="1" fill="#0ea5e9"/>
    <rect x="62" y="20" width="5" height="5" rx="1" fill="#0284c7"/>
    <rect x="70" y="26" width="5" height="5" rx="1" fill="#3b82f6"/>
    <rect x="76" y="34" width="5" height="5" rx="1" fill="#2563eb"/>
    <rect x="57" y="11" width="4" height="4" rx="1" fill="#f59e0b"/>
    <rect x="67" y="14" width="4" height="4" rx="1" fill="#fbbf24"/>

    <!-- Indian Tricolor Waving Swirl Underneath representing National Digital Empowerment -->
    <path d="M36 78c14-2.5 28 6 48-3.5" stroke="#f97316" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M38 82c14-2.5 28 6 48-3.5" stroke="#94a3b8" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M40 86c13-2.5 26 6 46-3.5" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Definition of gradients -->
  <defs>
    <linearGradient id="blue-grad-fav" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
</svg>
